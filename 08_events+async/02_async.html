<!-- setTimeout(), clearTimeout() -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Chai aur Code</h1>
    <button id="stop">Stop</button>
  </body>

  <script>
    // 1. setTimeout(handler, time)
    // setTimeout is used to perform a task after given time.
    // handler is a callback function without any name; it is a parameter inside setTimeout().

    // setTimeout syntax
    // setTimeout(function () {
    //     console.log("Hello");
    // }, 2000)

    // setTimeout by taking function as a reference
    // const sayHello = function () {
    //     console.log("Hello");
    // }
    // setTimeout(sayHello, 2000)

    // setTimeout inside the DOM
    // const changeText = function () {
    //     document.querySelector('h1').innerHTML = "best JS series"
    // }
    // const changeMe = setTimeout(changeText, 2000)
    // 2. clearTimeout()
    // how to stop this event ? -- clearTimeout()
    // clearTimeout wants reference.
    // clearTimeout(changeMe)

    // anotherWay with interacting with dom button with event
    const changeText = function () {
      document.querySelector("h1").innerHTML = "best JS series";
    };
    const changeMe = setTimeout(changeText, 2000);
    document.querySelector("#stop").addEventListener("click", function (e) {
      clearTimeout(changeMe);
      console.log("STOPPED!");
    });
  </script>
</html>
