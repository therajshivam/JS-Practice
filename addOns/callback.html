<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallBack</title>
</head>
<body>
    <h1 class="heading"></h1>
</body>

<script>
    // callback
    
    sum(dispayResult, 1, 2)

    function sum(callback, x, y) {
        let result = x + y
        callback(result)
    }

    function dispayResult(result) {
        document.querySelector('.heading').textContent = result;
        console.log(result);
        
    }


</script>
</html>
