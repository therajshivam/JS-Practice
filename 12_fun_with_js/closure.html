  <script>
    // lexical Scoping
    // inner function have access to the scope of outer function

    // If a variable is declared inside a function, we dont have access of the variable outside of the function.
    // If in a function, a variable declared. Its child functions (functions declared inside that main function) have access to the variable.
    // If a variable declare inside any child function, then its sibling functions dont have access of the variable. Also its parent cant access the variable.

    // +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
    /*
    Function scope is valid upto its execution.
    If a function is execute then its scope is scope is gone.
    If function's scope is gone then how lexical scope will work?
        means - Until the outer function exists till then inner function had access of its scope. If the outer function is gone then what will happen?

    Closure concept: although the function execution context of outer function is removed, but there comes the role of memory reference.

    Take example of below function:
    When myFunc runs it executes the makeFunc() function, and it will return the displayName function.
    Then the displayName is returned, then not only displayName() function will go, but if its outer function exists then the outer function's scope will too go. Because of lexical scoping.

    Whole memory will share not only functional execution context.
    */
    // Closure
    // Returning the whole function, will return the whole scope, scope means here lexical scope.
    /*
    function makeFunc() {
      const name = "Mozilla";
      function displayName() {
        console.log(name);
      }
      return displayName;
    }

    const myFunc = makeFunc();
    myFunc();
    */

  </script>

    function clickHandler(color) {
