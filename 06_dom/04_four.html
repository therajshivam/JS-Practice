<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: white;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>

<script>
    // task: add list element
    /*
    // 1. Basic Way
    function addLanguage(langName) {
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("Typescript")
    // It have a problem, whole dom tree traversal at every function call, not an optimised way.
    */
    
    // 2. More optimised approach
    function addOptiLanguage(langName) {
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(`${langName}`))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage("Python")
    addOptiLanguage("Typescript")
    addOptiLanguage("Golang")
    // This is a more optimised approach as the whole dom tree is not traversed
    
    // task: editing the value
    const secondLang = document.querySelector("li:nth-child(2)");
    // secondLang.innerHTML = "Mojo" 
    const newLi = document.createElement('li')
    newLi.textContent = "Mojo"
    secondLang.replaceWith(newLi)

    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<h1>Typescript</h1>'

    // task : removing value
    const lastLang = document.querySelector("li:last-child")
    lastLang.remove()

</script>

</html>
