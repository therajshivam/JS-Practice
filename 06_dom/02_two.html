<!-- DOM Traversal -->
<!-- Accessing elements of DOM through parent-child relation -->
<!-- Relation - Parent; Child  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <div class="parent">
        <!-- comment -->
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>

<script>
    const parent = document.querySelector('.parent')  // selecting .parent class
    console.log(parent);   

    console.log(parent.children);       // it gave htmlCollection of selected class' child elements
    console.log(parent.children[1]);     // for accessing first child element
    console.log(parent.children[1].innerHTML);    

    // looping HTMLCollections using for-loop, on html collection we can use for-loop
    for (let i = 0; i < parent.children.length; i++) {
        console.log(parent.children[i].innerHTML);       // prints all values of child elements  
    }

    parent.children[1].style.color = "orange"          // styling first child element 

    // accessing child element
    console.log(parent.firstElementChild);         // gives first child
    console.log(parent.lastElementChild);         // gives last child

    // child to parent
    const dayOne = document.querySelector('.day')   // selects the first child element
    console.log(dayOne);                        
    console.log(dayOne.parentElement);          // prints its parent
    console.log(dayOne.nextElementSibling);     // prints next adjecent element 
 
    // nodeList
    console.log("NODES: ", parent.childNodes); // gives values 11 nodelist
    // nodelist(childNodes) is a complex tree structure
    // linebreak is also a node
    // in html only one linebreak is considered after whatever linebreak given it will not considered
    // comment is also a nodelist

 </script>

</html>
